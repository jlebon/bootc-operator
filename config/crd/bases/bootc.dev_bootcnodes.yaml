---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: bootcnodes.bootc.dev
spec:
  group: bootc.dev
  names:
    kind: BootcNode
    listKind: BootcNodeList
    plural: bootcnodes
    singular: bootcnode
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.labels.bootc\.dev/pool
      name: Pool
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.booted.image
      name: Booted
      priority: 1
      type: string
    - jsonPath: .status.staged.image
      name: Staged
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          BootcNode tracks the bootc state of a single cluster node. Created by
          the daemon when it detects the node is a bootc host. The daemon reports
          status; the operator sets the spec when a BootcNodePool claims the node.
          When no pool claims the node, the spec is empty and the daemon just
          reports the current bootc state.

          The name MUST match the Kubernetes Node name. The ownerReference
          points to the Node object (not the pool), so the BootcNode is GC'd
          when the Node is deleted.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              spec defines the desired bootc state for this node. Set by the
              operator when a BootcNodePool claims this node. Empty when no
              pool has claimed the node (daemon just reports status).
            properties:
              desiredImage:
                description: |-
                  desiredImage is the container image digest that this node should be
                  running. Always a fully qualified digest reference
                  (e.g. "quay.io/example/my-image@sha256:abc123..."). Set by the
                  operator when a pool claims this node. Empty when no pool has
                  claimed the node.
                type: string
              desiredPhase:
                description: |-
                  desiredPhase is the phase that the daemon should work towards.
                  Must be one of "Staged", "Rebooting", or "RollingBack".
                  Set by the operator to drive the daemon through the rollout
                  lifecycle. Empty when no pool has claimed the node.
                enum:
                - Staged
                - Rebooting
                - RollingBack
                type: string
              rebootPolicy:
                description: |-
                  rebootPolicy determines how the daemon reboots this node.
                  Propagated from the owning BootcNodePool's disruption config.
                  Must be one of "Auto", "Full", or "Never". When empty, defaults
                  to "Auto".
                enum:
                - Auto
                - Full
                - Never
                type: string
            type: object
          status:
            description: status reflects the observed bootc state, reported by the
              daemon.
            properties:
              booted:
                description: booted is the bootc deployment that the node is currently
                  running.
                properties:
                  image:
                    description: |-
                      image is the fully qualified container image reference for this
                      deployment (e.g. "quay.io/example/my-image@sha256:abc123...").
                    type: string
                  softRebootCapable:
                    description: |-
                      softRebootCapable indicates whether this deployment can be reached
                      via a soft reboot (userspace-only restart) rather than a full
                      hardware reboot. This is true when the kernel and initramfs are
                      unchanged relative to the currently booted deployment.
                    type: boolean
                  timestamp:
                    description: timestamp is when this deployment's image was built.
                    format: date-time
                    type: string
                  version:
                    description: version is the image version label, if available.
                    type: string
                type: object
              bootedDigest:
                description: |-
                  bootedDigest is the resolved digest of the image currently
                  booted on this node (e.g. "sha256:abc123..."). This allows the
                  operator to compare the exact running image against the desired
                  digest without parsing the full booted BootEntryStatus.
                type: string
              conditions:
                description: |-
                  conditions represent the latest observations of this node's bootc
                  state. Known .status.conditions.type values are: "ImageStaged"
                  and "Healthy".
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              message:
                description: |-
                  message is a human-readable description of the current state or
                  error. Empty when no additional detail is available.
                type: string
              phase:
                description: phase is the daemon's current phase on this node.
                enum:
                - Ready
                - Staging
                - Staged
                - Rebooting
                - RollingBack
                - Error
                type: string
              rollback:
                description: |-
                  rollback is the bootc deployment that the node can roll back to,
                  if any.
                properties:
                  image:
                    description: |-
                      image is the fully qualified container image reference for this
                      deployment (e.g. "quay.io/example/my-image@sha256:abc123...").
                    type: string
                  softRebootCapable:
                    description: |-
                      softRebootCapable indicates whether this deployment can be reached
                      via a soft reboot (userspace-only restart) rather than a full
                      hardware reboot. This is true when the kernel and initramfs are
                      unchanged relative to the currently booted deployment.
                    type: boolean
                  timestamp:
                    description: timestamp is when this deployment's image was built.
                    format: date-time
                    type: string
                  version:
                    description: version is the image version label, if available.
                    type: string
                type: object
              staged:
                description: |-
                  staged is the bootc deployment that is staged for the next boot,
                  if any.
                properties:
                  image:
                    description: |-
                      image is the fully qualified container image reference for this
                      deployment (e.g. "quay.io/example/my-image@sha256:abc123...").
                    type: string
                  softRebootCapable:
                    description: |-
                      softRebootCapable indicates whether this deployment can be reached
                      via a soft reboot (userspace-only restart) rather than a full
                      hardware reboot. This is true when the kernel and initramfs are
                      unchanged relative to the currently booted deployment.
                    type: boolean
                  timestamp:
                    description: timestamp is when this deployment's image was built.
                    format: date-time
                    type: string
                  version:
                    description: version is the image version label, if available.
                    type: string
                type: object
              trackedImage:
                description: |-
                  trackedImage is the container image reference that bootc is
                  currently tracking on this node (i.e. what `bootc switch` was
                  last called with, or what the node was provisioned with). This
                  is the tag-based reference that bootc follows for updates.
                  Reported from `bootc status --json` spec.image field.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
