apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: daemon
  namespace: system
  labels:
    app.kubernetes.io/name: bootc-operator
    app.kubernetes.io/component: daemon
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: bootc-operator
      app.kubernetes.io/component: daemon
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bootc-operator
        app.kubernetes.io/component: daemon
    spec:
      nodeSelector:
        bootc.dev/managed: ""
      hostPID: true
      containers:
      - name: daemon
        command:
        - /daemon
        image: controller:latest
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        securityContext:
          privileged: true
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      serviceAccountName: daemon
      terminationGracePeriodSeconds: 10
