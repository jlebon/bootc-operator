apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: daemon
  namespace: system
  labels:
    app.kubernetes.io/name: bootc-daemon
    app.kubernetes.io/component: daemon
    app.kubernetes.io/part-of: bootc-operator
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: bootc-daemon
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bootc-daemon
    spec:
      serviceAccountName: daemon
      hostPID: true
      # Run on all nodes except those with the skip label.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node.bootc.dev/skip
                operator: DoesNotExist
      tolerations:
      - operator: Exists
      containers:
      - name: daemon
        image: daemon:latest
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        args:
        - "--node-name=$(NODE_NAME)"
        securityContext:
          privileged: true
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 128Mi
