apiVersion: bootc.dev/v1alpha1
kind: BootcNode
metadata:
  labels:
    app.kubernetes.io/name: bootc-operator
    app.kubernetes.io/managed-by: kustomize
  name: worker-1
# spec is normally set by the operator when a BootcNodePool claims this
# node. This example shows what a claimed BootcNode looks like.
spec:
  desiredImage: "quay.io/example/my-bootc-image@sha256:abc123def456..."
  desiredPhase: Staged
  rebootPolicy: Auto
